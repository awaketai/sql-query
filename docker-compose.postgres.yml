services:
  postgres:
    image: postgres:16-alpine
    container_name: dbquery-postgres
    environment:
      POSTGRES_USER: dbquery
      POSTGRES_PASSWORD: dbquery123
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbquery -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
